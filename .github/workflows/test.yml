name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0

      - name: Run unit tests
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: bats test/prompt.bats

  script-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-yq

      - name: Setup Bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0

      - name: Run script tests
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: bats test/generate_matrix.bats test/generate_manifest.bats
