name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-yq

      - name: Generate matrix
        id: gen
        run: echo "matrix=$(bash scripts/generate-matrix.sh)" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: ./.github/actions/setup-yq

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools linux-image-generic
          sudo chmod 0644 /boot/vmlinuz-*

      - name: Build image
        env:
          LIBGUESTFS_BACKEND: direct
        run: bash scripts/build.sh "${{ matrix.codename }}" "${{ matrix.arch }}" "${{ matrix.variant }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-${{ matrix.codename }}-${{ matrix.variant }}-${{ matrix.arch }}
          path: "*.img"

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-yq

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate manifest
        run: bash scripts/generate-manifest.sh > artifacts/manifest.json

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum *.img > checksums.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
