packages:
  - git

runcmd:
  # Install mise binary
  - curl -fsSL https://mise.run | MISE_INSTALL_PATH=/usr/local/bin/mise sh
  # Install Node.js LTS to system-wide location with shared config
  - MISE_DATA_DIR=/usr/local/share/mise /usr/local/bin/mise use -p /etc/mise/config.toml node@lts
  # Setup mise activation for all users
  - |
    cat > /etc/profile.d/mise.sh <<'PROFILE'
    export MISE_SHARED_INSTALL_DIRS=/usr/local/share/mise/installs
    export NPM_CONFIG_PREFIX="$HOME/.npm-global"
    export PATH="$HOME/.npm-global/bin:$PATH"
    eval "$(/usr/local/bin/mise activate bash)"
    PROFILE
  - |
    cat > /etc/profile.d/mise.zsh <<'PROFILE'
    export MISE_SHARED_INSTALL_DIRS=/usr/local/share/mise/installs
    export NPM_CONFIG_PREFIX="$HOME/.npm-global"
    export PATH="$HOME/.npm-global/bin:$PATH"
    eval "$(/usr/local/bin/mise activate zsh)"
    PROFILE
  # Install AI Coding CLI tools (specify node@lts explicitly so mise resolves npm binary)
  - MISE_DATA_DIR=/usr/local/share/mise /usr/local/bin/mise exec node@lts -- npm install -g @anthropic-ai/claude-code @github/copilot @google/gemini-cli @openai/codex
  # Ensure all users can read/execute mise tools (must run after npm install)
  - chmod -R a+rX /usr/local/share/mise
