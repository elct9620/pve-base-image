packages:
  - git

runcmd:
  # Install mise
  - curl -fsSL https://mise.run | MISE_INSTALL_PATH=/usr/local/bin/mise sh
  # Install Node.js LTS via mise
  - /usr/local/bin/mise use --global node@lts
  # Install AI Coding CLI tools
  - eval "$(/usr/local/bin/mise activate bash)" && npm install -g @anthropic-ai/claude-code @github/copilot @google/gemini-cli @openai/codex
  # Setup mise activation for all users
  - echo 'eval "$(/usr/local/bin/mise activate bash)"' > /etc/profile.d/mise.sh
  - echo 'eval "$(/usr/local/bin/mise activate zsh)"' > /etc/profile.d/mise.zsh
